packages:
  - 'apps/*'
  - 'packages/*'
  # tools/* 下只有 arch-test / configs 是 Node 子包, 其他 (blender / blender-mcp-main /
  # voxcpm-server) 没 package.json. 列具体路径防 pnpm 11 把空目录当 workspace 找不到 package.json 报错.
  - 'tools/arch-test'
  - 'tools/configs'

allowBuilds:
  better-sqlite3: true
  esbuild: true
  sharp: true

catalog:
  # ─── runtime / framework ───
  typescript: ^5.6.3
  '@types/node': ^22.10.0
  tsx: ^4.19.0

  # ─── react / next ───
  react: ^19.0.0
  react-dom: ^19.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  next: ^15.1.0
  tailwindcss: ^3.4.0
  autoprefixer: ^10.4.0
  postcss: ^8.4.0

  # ─── backend ───
  fastify: ^5.1.0
  '@fastify/websocket': ^11.0.0
  '@fastify/cors': ^10.0.0
  pino: ^9.5.0
  pino-pretty: ^11.3.0

  # ─── db ───
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.0
  better-sqlite3: ^11.5.0
  '@types/better-sqlite3': ^7.6.0

  # ─── validation / schema ───
  zod: ^3.23.8
  zod-to-json-schema: ^3.23.5

  # ─── http / process ───
  undici: ^7.1.0
  execa: ^9.5.0
  node-cron: ^3.0.3
  '@types/node-cron': ^3.0.0

  # ─── redis (DJ 短期内存热缓存) ───
  ioredis: ^5.4.1

  # ─── netease ───
  NeteaseCloudMusicApi: ^4.32.0

  # ─── lint / test / format ───
  eslint: ^9.16.0
  '@typescript-eslint/eslint-plugin': ^8.16.0
  '@typescript-eslint/parser': ^8.16.0
  typescript-eslint: ^8.16.0
  eslint-plugin-import: ^2.31.0
  eslint-plugin-promise: ^7.2.0
  eslint-plugin-unused-imports: ^4.1.0
  prettier: ^3.4.0
  vitest: ^2.1.0

  # ─── tooling ───
  husky: ^9.1.0
  lint-staged: ^15.2.0
  dependency-cruiser: ^16.7.0
